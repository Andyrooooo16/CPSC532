<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionnaire · Reading Study</title>
  <link rel="stylesheet" href="/app/app.css">
</head>
<body>
  <div class="page-centered">
    <div class="progress-bar-wrap">
      <div class="progress-label" id="progress-label">Paper … of …</div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h1 id="heading">Post-Reading Questionnaire</h1>
      <p class="subtitle" id="instructions">Please answer the following questions.</p>

      <div id="error-banner" class="banner banner-error" style="display:none"></div>

      <form id="q-form" novalidate>
        <div id="questions-container"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Continue</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { guardPage, getSessionId } from '/app/session.js';
    import { renderQuestions, collectAnswers, validateAnswers } from '/app/question-renderer.js';

    const sessionId = getSessionId();
    const state = await guardPage('questionnaire');
    if (!state) throw new Error('redirect');

    const { paperIndex, totalPapers } = state;
    const paperNum = paperIndex + 1;

    // Progress: questionnaire comes after reading, so ~(paperNum / totalPapers * 80) + a bit
    const pct = Math.round(paperNum / totalPapers * 85);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `Paper ${paperNum} of ${totalPapers} — Questionnaire`;
    document.getElementById('heading').textContent = `Post-Reading Questionnaire — Paper ${paperNum}`;

    const res = await fetch(`/api/session/${sessionId}/questionnaire-items`);
    if (!res.ok) { window.location.href = `/session/${sessionId}`; }
    const data = await res.json();

    document.getElementById('instructions').textContent = data.instructions || '';
    const container = document.getElementById('questions-container');
    renderQuestions(container, data.questions);

    const errorBanner = document.getElementById('error-banner');
    const submitBtn = document.getElementById('submit-btn');

    document.getElementById('q-form').addEventListener('submit', async e => {
      e.preventDefault();
      errorBanner.style.display = 'none';

      // Only require non-free-text questions
      const required = data.questions.filter(q => q.type !== 'free_text');
      const unanswered = validateAnswers(container, required);
      if (unanswered.length > 0) {
        errorBanner.textContent = 'Please answer all required questions before continuing.';
        errorBanner.style.display = 'block';
        return;
      }

      const responses = collectAnswers(container);
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      try {
        const r = await fetch(`/api/session/${sessionId}/submit-questionnaire`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ responses }),
        });
        if (!r.ok) throw new Error(`Server error ${r.status}`);
        const { nextPath } = await r.json();
        window.location.href = nextPath;
      } catch (err) {
        errorBanner.textContent = err.message || 'Something went wrong.';
        errorBanner.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
